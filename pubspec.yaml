name: chatbox_flutter
description: "多模型 AI 聊天应用 - Flutter 版本"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  get:
  dio: ^5.8.0+1
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  flutter_staggered_grid_view: ^0.6.1
  flutter_markdown: ^0.7.4+1
  file_picker: ^8.1.7
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

dependency_overrides:
  file_picker:
    path: local_plugins/file_picker

flutter:
  uses-material-design: true
